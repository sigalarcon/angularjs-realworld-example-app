<div class="article-preview">
  <article-meta article="$ctrl.article">
    <favorite-btn
      article="$ctrl.article"
      class="pull-xs-right">
      {{$ctrl.article.favoritesCount}}
    </favorite-btn>
  </article-meta>

  <a ui-sref="app.article({ slug: $ctrl.article.slug })" class="preview-link">
    <img ng-if="$ctrl.article.image" ng-src="{{$ctrl.article.image}}"
      style="width:100%;max-height:200px;object-fit:cover;border-radius:4px;margin-bottom:1rem;" />
    <h1 ng-bind="$ctrl.article.title"></h1>
    <p ng-bind="$ctrl.article.description"></p>
    <span>Read more...</span>
    <ul class="tag-list">
      <li class="tag-default tag-pill tag-outline"
        ng-repeat="tag in $ctrl.article.tagList">
        {{tag}}
      </li>
    </ul>
  </a>
</div>
